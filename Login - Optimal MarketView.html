// Immediately hide body content on initial page load (runs before DOM is ready)
(function() {
    if (document.body) {
        document.body.classList.add('loading-active');
    } else {
        // Wait for body to exist
        const observer = new MutationObserver(function(mutations, obs) {
            if (document.body) {
                document.body.classList.add('loading-active');
                obs.disconnect();
            }
        });
        observer.observe(document.documentElement, { childList: true });
    }
})();
</script>

<script>
// Loading overlay management - runs immediately
(function() {
    let loadingOverlay = null;
    let isInitialized = false;
    
    // Initialize overlay reference
    function initOverlay() {
        if (!loadingOverlay) {
            loadingOverlay = document.getElementById('loading-overlay');
        }
        return loadingOverlay !== null;
    }
    
    // Show loading overlay immediately
    function showLoading() {
        if (!initOverlay()) {
            // If overlay doesn't exist yet, create it
            const overlay = document.createElement('div');
            overlay.id = 'loading-overlay';
            overlay.className = 'fixed inset-0 bg-white z-[99999] flex items-center justify-center transition-opacity duration-300';
            overlay.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; z-index: 99999; background: white;';
            overlay.innerHTML = `
                <div class="text-center">
                    <div class="relative w-20 h-20 mx-auto mb-6">
                        <div class="absolute inset-0 border-4 border-orange-100 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-orange-500 rounded-full border-t-transparent animate-spin"></div>
                        <div class="absolute inset-2 border-4 border-orange-200 rounded-full border-b-transparent animate-spin" style="animation-direction: reverse; animation-duration: 0.8s;"></div>
                    </div>
                    <p class="text-gray-700 font-semibold text-xl">Loading...</p>
                    <p class="text-gray-500 text-sm mt-2">Please wait</p>
                </div>
            `;
            overlay.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; z-index: 99999; background: white; display: flex; align-items: center; justify-content: center;';
            document.body.appendChild(overlay);
            loadingOverlay = overlay;
        }
        
        if (loadingOverlay) {
            // Show immediately with no delay - ensure it covers everything
            loadingOverlay.style.cssText = 'position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 99999 !important; background: white !important; display: flex !important; align-items: center !important; justify-content: center !important; opacity: 1 !important;';
            loadingOverlay.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            
            // Hide all body content except the loading overlay
            document.body.classList.add('loading-active');
        }
    }
    
    // Hide loading overlay
    function hideLoading() {
        if (initOverlay() && loadingOverlay) {
            loadingOverlay.style.opacity = '0';
            setTimeout(function() {
                if (loadingOverlay) {
                    loadingOverlay.style.display = 'none';
                    loadingOverlay.classList.add('hidden');
                    document.body.style.overflow = '';
                    // Show body content again
                    document.body.classList.remove('loading-active');
                }
            }, 300);
        }
    }
    
    // Initialize when DOM is ready
    function initialize() {
        if (isInitialized) return;
        isInitialized = true;
        
        initOverlay();
        
        // Initially hide body content until page is fully loaded
        // This prevents navbar and content from showing during initial page load
        if (document.readyState === 'loading') {
            document.body.classList.add('loading-active');
        }
        
        // Show loading on link clicks - use capture phase for immediate response
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a');
            if (link && link.href) {
                // Skip special links
                if (link.href.startsWith('javascript:') || 
                    link.href.startsWith('mailto:') || 
                    link.href.startsWith('tel:') ||
                    link.target === '_blank' ||
                    link.hasAttribute('data-no-loading')) {
                    return;
                }
                
                // Check if it's an internal link
                try {
                    const currentHost = window.location.host;
                    const linkUrl = new URL(link.href, window.location.href);
                    const linkHost = linkUrl.host;
                    const currentPath = window.location.pathname;
                    const linkPath = linkUrl.pathname;
                    
                    // Only show loading for internal navigation (same host)
                    if ((linkHost === currentHost || linkHost === '') && linkPath !== currentPath) {
                        // Don't show for anchors
                        if (!link.href.includes('#') || link.href.split('#')[0] !== window.location.href.split('#')[0]) {
                            // Show IMMEDIATELY - no delay, no animation frame
                            showLoading();
                        }
                    }
                } catch (err) {
                    // Invalid URL, ignore
                }
            }
        }, true); // Use capture phase for immediate response - runs BEFORE default behavior
        
        // Show loading on form submissions (but not if form has data-no-confirm attribute)
        document.addEventListener('submit', function(e) {
            const form = e.target;
            // Don't show loading if form has data-no-loading or data-no-confirm attribute
            // (data-no-confirm forms show confirmation modals first)
            if (form.tagName === 'FORM' && 
                form.method.toLowerCase() !== 'get' &&
                !form.hasAttribute('data-no-loading') &&
                !form.hasAttribute('data-no-confirm')) {
                showLoading();
            }
        }, true);
        
        // Hide loading when page is fully loaded (with a small delay to show it briefly)
        function hideOnLoad() {
            // Show briefly on page load, then hide
            setTimeout(function() {
                hideLoading();
            }, 200);
        }
        
        // Wait for page to be fully loaded before showing content
        if (document.readyState === 'complete') {
            hideOnLoad();
        } else {
            window.addEventListener('load', function() {
                // Small delay to ensure everything is rendered
                setTimeout(hideOnLoad, 100);
            });
            // Also handle DOMContentLoaded as fallback
            document.addEventListener('DOMContentLoaded', function() {
                // Only hide if page is already complete, otherwise wait for load event
                if (document.readyState === 'complete') {
                    hideOnLoad();
                }
            });
        }
        
        // Also hide on page visibility change (back button, etc.)
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                setTimeout(hideLoading, 100);
            }
        });
    }
    
    // Initialize immediately if DOM is ready, otherwise wait
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initialize);
    } else {
        initialize();
    }
    
    // Also initialize on page show (for back/forward navigation)
    window.addEventListener('pageshow', function() {
        hideLoading();
    });
    
    // Expose functions globally for manual control
    window.showLoading = showLoading;
    window.hideLoading = hideLoading;
})();
</script>

                const originalText = button.textContent;
